apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
  - name: connectionString
    value: amqp://rabbitmq:5672
  - name: durable
    value: true
  - name: deletedWhenUnused
    value: false
  - name: autoAck
    value: false
  - name: prepetchCount
    value: 50
  - name: reconnectWait
    value: 5
  - name: concurrencyMode
    value: parallel
scope:
  - contentmoderationservice-api
  - salesforceservice-api