services:
  gateway-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "5005:8080"

  contentmoderationservice-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

  contentmoderationservice-dapr:    
    command: >
      ./daprd
      --app-id contentmoderationservice-api
      --app-port 8080
      --resources-path /dapr/components
      --config /dapr/config.yaml
    volumes:
      - ./dapr/components/:/dapr/components
      - ./dapr/config.yaml:/dapr/config.yaml

  salesforceservice-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

  salesforceservice-dapr:    
    command: >
      ./daprd
      --app-id salesforceservice-api
      --app-port 8080
      --resources-path /dapr/components
      --config /dapr/config.yaml
    volumes:
      - ./dapr/components/:/dapr/components
      - ./dapr/config.yaml:/dapr/config.yaml


  # Postgres Databases
  contentmoderation_db:
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "Password123!"
      POSTGRES_DB: "ContentModerationDB"
    volumes:
      - contentmoderation_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  salesforce_db:
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "Password123!"
      POSTGRES_DB: "SalesforceDB"
    volumes:
      - salesforce_db_data:/var/lib/postgresql/data
    restart: unless-stopped


  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"  # AMQP port
      - "15672:15672"  # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  contentmoderation_db_data:
  salesforce_db_data:
  rabbitmq_data: 